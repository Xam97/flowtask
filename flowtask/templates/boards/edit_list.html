{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Lista - FlowTask{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-card">
                <div class="form-card-header">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2 class="form-card-title">
                            <i class="fas fa-edit"></i> Editar Lista
                        </h2>
                        <a href="{% url 'board_detail' list.board.id %}" class="btn btn-sm btn-close-form">
                            <i class="fas fa-times"></i>
                        </a>
                    </div>
                </div>
                <div class="form-card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group-modern">
                            <label for="name" class="form-label-modern">Nombre de la lista</label>
                            <input type="text" name="name" id="name" class="form-control-modern" value="{{ list.name }}" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary btn-modern">
                                <i class="fas fa-save"></i> Guardar Cambios
                            </button>
                            <a href="{% url 'board_detail' list.board.id %}" class="btn btn-secondary btn-modern">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
