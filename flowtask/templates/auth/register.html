{% extends 'base.html' %}
{% load static %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-tasks fa-3x"></i>
            <h2>FlowTask</h2>
            <p>Crea tu cuenta gratis</p>
        </div>
        
        <form method="POST" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">
                    <i class="fas fa-user"></i>
                    Usuario
                </label>
                <input type="text" name="username" id="id_username" class="form-control" required>
                <small class="text-muted">Requerido. 150 caracteres o menos.</small>
            </div>
            
            <div class="form-group">
                <label for="id_password1">
                    <i class="fas fa-lock"></i>
                    Contraseña
                </label>
                <input type="password" name="password1" id="id_password1" class="form-control" required>
                <small class="text-muted">Mínimo 8 caracteres. No puede ser solo números.</small>
            </div>
            
            <div class="form-group">
                <label for="id_password2">
                    <i class="fas fa-check-circle"></i>
                    Confirmar Contraseña
                </label>
                <input type="password" name="password2" id="id_password2" class="form-control" required>
            </div>
            
            <button type="submit" class="btn-auth">
                <i class="fas fa-user-plus"></i>
                Registrarse
            </button>
        </form>
        
        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia Sesión</a>
        </div>
    </div>
</div>
{% endblock %}
